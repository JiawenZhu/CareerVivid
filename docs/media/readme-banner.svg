<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CareerVivid — Learn, Practice, Get hired">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1c1633"/>
      <stop offset="0.55" stop-color="#2a2150"/>
      <stop offset="1" stop-color="#4534a0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8f7ad9"/>
      <stop offset="0.5" stop-color="#c9b8ff"/>
      <stop offset="1" stop-color="#e8a33d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#8f7ad9" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8f7ad9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="320" rx="16" fill="url(#bg)"/>
  <rect width="1280" height="320" rx="16" fill="url(#glow)"/>

  <!-- dotted grid texture -->
  <g fill="#ffffff" opacity="0.07">
    <circle cx="60" cy="40" r="2"/><circle cx="140" cy="40" r="2"/><circle cx="220" cy="40" r="2"/><circle cx="300" cy="40" r="2"/><circle cx="380" cy="40" r="2"/>
    <circle cx="100" cy="100" r="2"/><circle cx="180" cy="100" r="2"/><circle cx="260" cy="100" r="2"/><circle cx="340" cy="100" r="2"/>
    <circle cx="60" cy="160" r="2"/><circle cx="140" cy="160" r="2"/><circle cx="220" cy="160" r="2"/>
    <circle cx="1180" cy="250" r="2"/><circle cx="1100" cy="250" r="2"/><circle cx="1020" cy="250" r="2"/>
    <circle cx="1140" cy="290" r="2"/><circle cx="1060" cy="290" r="2"/>
  </g>

  <!-- decorative animation motifs: sliding-window cells -->
  <g transform="translate(920, 60)">
    <rect x="0" y="0" width="44" height="44" rx="9" fill="#ffffff" opacity="0.08"/>
    <rect x="52" y="0" width="44" height="44" rx="9" fill="#8fc4f0" opacity="0.85"/>
    <rect x="104" y="0" width="44" height="44" rx="9" fill="#8fc4f0" opacity="0.85"/>
    <rect x="156" y="0" width="44" height="44" rx="9" fill="#f0c08a" opacity="0.95"/>
    <rect x="208" y="0" width="44" height="44" rx="9" fill="#ffffff" opacity="0.08"/>
    <text x="74" y="29" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="20" font-weight="700" fill="#10224a">3</text>
    <text x="126" y="29" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="20" font-weight="700" fill="#10224a">5</text>
    <text x="178" y="29" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="20" font-weight="700" fill="#5b3a09">8</text>
    <path d="M52 56 L200 56" stroke="#86e0a8" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <text x="52" y="78" font-family="-apple-system,Segoe UI,sans-serif" font-size="13" font-weight="700" fill="#86e0a8">sliding window</text>
  </g>

  <!-- decorative hash ring -->
  <g transform="translate(1040, 190)">
    <circle cx="60" cy="60" r="52" stroke="#c9b8ff" stroke-width="3" fill="none" opacity="0.5"/>
    <circle cx="60" cy="8" r="9" fill="#86e0a8"/>
    <circle cx="105" cy="34" r="9" fill="#86e0a8"/>
    <circle cx="105" cy="86" r="9" fill="#f4a5b8"/>
    <circle cx="60" cy="112" r="9" fill="#8fc4f0"/>
    <circle cx="15" cy="86" r="9" fill="#8fc4f0"/>
    <circle cx="15" cy="34" r="9" fill="#f0c08a"/>
  </g>

  <!-- wordmark -->
  <text x="72" y="128" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="64" font-weight="800" fill="#ffffff" letter-spacing="-1.5">Career<tspan fill="url(#accent)">Vivid</tspan></text>

  <!-- tagline -->
  <text x="74" y="176" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="26" font-weight="600" fill="#d9d2f5">Learn&#160;&#160;→&#160;&#160;Practice&#160;&#160;→&#160;&#160;Get&#160;hired</text>

  <!-- feature chips -->
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="15" font-weight="700">
    <rect x="72" y="208" width="196" height="38" rx="19" fill="#ffffff" opacity="0.12"/>
    <text x="170" y="232" text-anchor="middle" fill="#ffffff">🎓 Animated courses</text>
    <rect x="280" y="208" width="204" height="38" rx="19" fill="#ffffff" opacity="0.12"/>
    <text x="382" y="232" text-anchor="middle" fill="#ffffff">🎤 AI mock interviews</text>
    <rect x="496" y="208" width="176" height="38" rx="19" fill="#ffffff" opacity="0.12"/>
    <text x="584" y="232" text-anchor="middle" fill="#ffffff">💼 Verified jobs</text>
    <rect x="684" y="208" width="160" height="38" rx="19" fill="#ffffff" opacity="0.12"/>
    <text x="764" y="232" text-anchor="middle" fill="#ffffff">⚡ Auto-apply</text>
  </g>

  <!-- url -->
  <text x="74" y="286" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="17" font-weight="600" fill="#a99ae0">careervivid.app</text>
</svg>
