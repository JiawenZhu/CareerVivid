<!-- @dsCard group="Extension" viewport="400x700" name="Side panel" subtitle="Job detected → match → actions, sticky header + bottom nav" -->
<!-- @startingPoint section="App screens" subtitle="Chrome extension side panel" viewport="400x700" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareerVivid — extension side panel</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../assets/icons/lucide-icons.js"></script>
<style>html, body { margin: 0; background: var(--cv-neutral-200); } </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const P = '#625bd5', PH = '#514ac5', PSOFT = '#eef0ff', PRING = '#dfe2ff', PTINT = '#f3f2ff';
const extFont = 'var(--cv-font-body)';

function Ic({ name, size = 16, sw = 2, style }) {
  return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke="currentColor" strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" style={style}
    dangerouslySetInnerHTML={{ __html: window.CV_LUCIDE[name] || '' }} />;
}

function ActionCard({ icon, bg, fg, title, desc, primary }) {
  const [h, setH] = React.useState(false);
  return (
    <button type="button" onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
      style={{ display: 'flex', alignItems: 'center', gap: 12, width: '100%', textAlign: 'left', padding: '12px 14px', borderRadius: 18,
        background: '#fff', border: `1px solid ${h ? PRING : '#ececf4'}`, boxShadow: h ? '0 8px 24px rgba(98,91,213,0.08)' : '0 8px 18px rgba(15,23,42,0.04)',
        cursor: 'pointer', transition: 'all 200ms cubic-bezier(0.2,0,0,1)', fontFamily: extFont, boxSizing: 'border-box' }}>
      <span style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', width: 38, height: 38, flexShrink: 0, borderRadius: 12, background: bg, color: fg }}>
        <Ic name={icon} size={17} />
      </span>
      <span style={{ minWidth: 0, flex: 1 }}>
        <span style={{ display: 'block', fontSize: 13, fontWeight: 700, color: 'var(--cv-neutral-950)' }}>{title}</span>
        <span style={{ display: 'block', marginTop: 1, fontSize: 11, fontWeight: 500, color: 'var(--cv-neutral-500)' }}>{desc}</span>
      </span>
      <Ic name="chevron-right" size={15} style={{ color: h ? P : 'var(--cv-neutral-300)', flexShrink: 0 }} />
    </button>
  );
}

function Panel() {
  const [tab, setTab] = React.useState('home');
  const tabs = [
    { id: 'home', label: 'Home', icon: 'home' },
    { id: 'resumes', label: 'Resumes', icon: 'file-text' },
    { id: 'tracker', label: 'Tracker', icon: 'kanban-square' },
    { id: 'profile', label: 'Profile', icon: 'circle-user-round' },
  ];
  return (
    <div style={{ width: 380, minHeight: 640, margin: '20px auto', display: 'flex', flexDirection: 'column', background: '#f8f8fb', borderRadius: 12, overflow: 'hidden', boxShadow: '0 24px 70px rgba(17,24,39,0.24)', fontFamily: extFont }} data-screen-label="extension-home">
      <header style={{ position: 'sticky', top: 0, zIndex: 2, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 10, padding: '10px 14px', background: 'rgba(255,255,255,0.95)', backdropFilter: 'blur(8px)', borderBottom: '1px solid #ececf4' }}>
        <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <img src="../../assets/logo/careervivid-icon-128.png" alt="" style={{ width: 24, height: 24 }} />
          <span style={{ fontFamily: 'var(--cv-font-heading)', fontSize: 14, fontWeight: 700, color: 'var(--cv-neutral-900)' }}>CareerVivid</span>
        </span>
        <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', width: 30, height: 30, borderRadius: 8, border: '1px solid #ececf4', background: '#fff', color: 'var(--cv-neutral-500)' }}><Ic name="sun" size={14} /></span>
          <img src="../../assets/avatars/careervivid-rabbit-glasses.jpg" alt="" style={{ width: 36, height: 36, borderRadius: 999, objectFit: 'cover', boxShadow: '0 0 0 2px #fff' }} />
        </span>
      </header>

      <main style={{ flex: 1, padding: 14, display: 'flex', flexDirection: 'column', gap: 10 }}>
        <div style={{ padding: 16, borderRadius: 20, background: '#fff', border: '1px solid #ececf4', boxShadow: '0 8px 18px rgba(15,23,42,0.04)' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8 }}>
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, borderRadius: 999, padding: '3px 10px', fontSize: 10, fontWeight: 700, background: '#eef9f2', color: '#15803d', border: '1px solid #cfe8d5' }}>
              <span style={{ width: 6, height: 6, borderRadius: 999, background: '#22c55e' }}></span> Job detected
            </span>
            <span style={{ fontSize: 10, fontWeight: 600, color: 'var(--cv-neutral-400)' }}>greenhouse.io</span>
          </div>
          <h2 style={{ margin: '10px 0 0', fontFamily: extFont, fontSize: 15, fontWeight: 700, color: 'var(--cv-neutral-950)' }}>Senior Frontend Engineer</h2>
          <p style={{ margin: '2px 0 0', fontSize: 12, fontWeight: 600, color: 'var(--cv-neutral-500)' }}>Figma · San Francisco / Remote</p>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginTop: 12, padding: '10px 12px', borderRadius: 12, background: PTINT, border: `1px solid ${PRING}` }}>
            <span style={{ fontFamily: 'var(--cv-font-heading)', fontSize: 22, fontWeight: 800, color: P }}>86%</span>
            <div style={{ flex: 1 }}>
              <p style={{ margin: 0, fontSize: 11, fontWeight: 700, color: 'var(--cv-neutral-900)' }}>Resume match</p>
              <div style={{ marginTop: 5, height: 5, borderRadius: 999, background: '#fff', overflow: 'hidden' }}>
                <div style={{ height: '100%', width: '86%', borderRadius: 999, background: P }}></div>
              </div>
            </div>
            <span style={{ fontSize: 10, fontWeight: 700, color: P }}>Active resume</span>
          </div>
          <div style={{ display: 'flex', gap: 8, marginTop: 12 }}>
            <button type="button" style={{ display: 'inline-flex', flex: 1, alignItems: 'center', justifyContent: 'center', gap: 6, height: 36, borderRadius: 10, border: 'none', background: P, color: '#fff', fontFamily: extFont, fontSize: 12, fontWeight: 700, cursor: 'pointer' }}>
              <Ic name="zap" size={14} /> Autofill application
            </button>
            <button type="button" style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 6, height: 36, padding: '0 12px', borderRadius: 10, background: '#fff', color: 'var(--cv-neutral-700)', border: '1px solid var(--cv-border-product)', fontFamily: extFont, fontSize: 12, fontWeight: 700, cursor: 'pointer' }}>
              Save to tracker
            </button>
          </div>
        </div>

        <ActionCard icon="wand-2" bg={PTINT} fg={P} title="Tailor resume" desc="Rewrite your active resume for this role" />
        <ActionCard icon="target" bg="#fffbeb" fg="#b45309" title="Match keywords" desc="12 missing keywords found in the posting" />
        <ActionCard icon="mic" bg="#fff6f6" fg="#b64a5a" title="Practice" desc="Mock interview from this job description" />

        <div style={{ padding: '12px 14px', borderRadius: 18, background: '#fff', border: '1px solid #ececf4', boxShadow: '0 8px 18px rgba(15,23,42,0.04)' }}>
          <p style={{ margin: 0, fontSize: 11, fontWeight: 700, color: 'var(--cv-neutral-900)' }}>Career pipeline</p>
          <div style={{ display: 'flex', gap: 6, marginTop: 8 }}>
            {[['To Apply', 2, '#6b7280'], ['Applied', 5, '#3b82f6'], ['Interviewing', 1, '#eab308'], ['Offered', 1, '#22c55e']].map(([label, count, color]) => (
              <span key={label} style={{ display: 'inline-flex', alignItems: 'center', gap: 5, borderRadius: 999, padding: '3px 9px', fontSize: 10, fontWeight: 700, background: 'var(--cv-neutral-100)', color: 'var(--cv-neutral-600)' }}>
                <span style={{ width: 8, height: 8, borderRadius: 999, background: color }}></span>{count}
              </span>
            ))}
            <span style={{ marginLeft: 'auto', fontSize: 10, fontWeight: 700, color: P }}>Open pipeline →</span>
          </div>
        </div>
      </main>

      <footer style={{ position: 'sticky', bottom: 0, display: 'flex', borderTop: '1px solid #ececf4', background: 'rgba(255,255,255,0.95)', backdropFilter: 'blur(8px)' }}>
        {tabs.map((t) => {
          const active = tab === t.id;
          return (
            <button key={t.id} type="button" onClick={() => setTab(t.id)}
              style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, padding: '9px 0 8px', border: 'none', background: 'transparent', cursor: 'pointer', color: active ? P : 'var(--cv-neutral-400)', fontFamily: extFont, fontSize: 9.5, fontWeight: 700 }}>
              <Ic name={t.icon} size={17} />{t.label}
            </button>
          );
        })}
      </footer>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Panel />);
</script>
</body>
</html>
