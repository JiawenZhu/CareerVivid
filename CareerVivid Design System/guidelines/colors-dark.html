<!-- @dsCard group="Colors" viewport="700x190" name="Dark mode" subtitle="html.dark — warm world vs navy product world" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; padding: 16px; background: #ffffff; font-family: var(--cv-font-body); }
.panel { border-radius: 12px; padding: 14px; box-sizing: border-box; flex: 1; }
.panel h4 { margin: 0; font-size: 13px; font-weight: 700; font-family: var(--cv-font-body); }
.panel p { margin: 4px 0 0; font-size: 11px; font-weight: 500; }
.chip { display: inline-block; margin-top: 10px; border-radius: 999px; padding: 3px 10px; font-size: 10px; font-weight: 700; }
</style>
</head>
<body>
<div style="display: flex; gap: 10px;">
  <div class="panel" style="background: #1f1f1d; border: 1px solid #37332d;">
    <h4 style="color: #f4f1e9;">Warm world dark</h4>
    <p style="color: #aaa39a;">Page #1f1f1d · surface #262522 · border #37332d</p>
    <span class="chip" style="background: rgba(47,43,85,0.7); color: #bbb8ff; border: 1px solid #484273;">Soft action</span>
    <span class="chip" style="background: #7069dc; color: #fff;">Primary 7069dc</span>
  </div>
  <div class="panel" style="background: #0f172a; border: 1px solid #374151;">
    <h4 style="color: #f4f1e9;">Product world dark</h4>
    <p style="color: #94a3b8;">Shell #0f172a · surface #111827 · border #374151</p>
    <span class="chip" style="background: #111827; color: #94a3b8; border: 1px solid #374151;">Card</span>
    <span class="chip" style="background: #7069dc; color: #fff;">Primary</span>
    <span class="chip" style="background: transparent; color: #caa26c; border: 1px solid #37332d;">Eyebrow caa26c</span>
  </div>
</div>
<p style="margin: 12px 0 0; font-size: 11px; font-weight: 600; color: var(--cv-text-muted);">Convert white cards to dark cards — never mix bright panels onto dark backgrounds. Accents soften.</p>
</body>
</html>
