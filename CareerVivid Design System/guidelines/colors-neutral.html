<!-- @dsCard group="Colors" viewport="700x170" name="Neutrals (product surfaces)" subtitle="#f8f8fb shell, white cards, gray text ramp" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; padding: 16px; background: #ffffff; font-family: var(--cv-font-body); }
.row { display: flex; gap: 5px; }
.sw { flex: 1; height: 80px; border-radius: 8px; display: flex; flex-direction: column; justify-content: flex-end; padding: 7px; box-sizing: border-box; border: 1px solid rgba(0,0,0,0.05); }
.sw p { margin: 0; font-size: 9px; font-weight: 700; font-family: var(--cv-font-mono); }
</style>
</head>
<body>
<div class="row">
  <div class="sw" style="background: var(--cv-neutral-50);"><p style="color: #6b7280;">50 shell</p></div>
  <div class="sw" style="background: var(--cv-neutral-100);"><p style="color: #6b7280;">100</p></div>
  <div class="sw" style="background: var(--cv-neutral-200);"><p style="color: #4b5563;">200 border</p></div>
  <div class="sw" style="background: var(--cv-neutral-300);"><p style="color: #374151;">300</p></div>
  <div class="sw" style="background: var(--cv-neutral-400);"><p style="color: #fff;">400 subtle</p></div>
  <div class="sw" style="background: var(--cv-neutral-500);"><p style="color: #fff;">500 muted</p></div>
  <div class="sw" style="background: var(--cv-neutral-700);"><p style="color: #fff;">700</p></div>
  <div class="sw" style="background: var(--cv-neutral-900);"><p style="color: #fff;">900 heading</p></div>
  <div class="sw" style="background: var(--cv-neutral-950);"><p style="color: #fff;">950 filter</p></div>
</div>
<p style="margin: 10px 0 0; font-size: 11px; font-weight: 600; color: var(--cv-text-muted);">App + extension world: #f8f8fb background, #ffffff cards, #ececf4/#e5e7eb borders.</p>
</body>
</html>
