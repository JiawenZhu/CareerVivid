<!-- @dsCard group="Spacing" viewport="700x210" name="Spacing scale" subtitle="4px base scale — 4 to 64" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; padding: 18px 24px; background: #ffffff; font-family: var(--cv-font-body); }
.r { display: flex; align-items: center; gap: 12px; margin-bottom: 7px; }
.r i { display: block; height: 12px; border-radius: 3px; background: var(--cv-purple-600); opacity: 0.85; }
.r code { font-family: var(--cv-font-mono); font-size: 10px; font-weight: 600; color: var(--cv-neutral-500); width: 130px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="r"><code>--cv-space-1 · 4px</code><i style="width: 4px;"></i></div>
<div class="r"><code>--cv-space-2 · 8px</code><i style="width: 8px;"></i></div>
<div class="r"><code>--cv-space-3 · 12px</code><i style="width: 12px;"></i></div>
<div class="r"><code>--cv-space-4 · 16px</code><i style="width: 16px;"></i></div>
<div class="r"><code>--cv-space-6 · 24px</code><i style="width: 24px;"></i></div>
<div class="r"><code>--cv-space-8 · 32px</code><i style="width: 32px;"></i></div>
<div class="r"><code>--cv-space-12 · 48px</code><i style="width: 48px;"></i></div>
<div class="r" style="margin-bottom: 0;"><code>--cv-space-16 · 64px</code><i style="width: 64px;"></i></div>
</body>
</html>
