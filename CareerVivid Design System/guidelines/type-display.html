<!-- @dsCard group="Type" viewport="700x230" name="Display type" subtitle="Plus Jakarta Sans headings, letter-spacing 0" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>body { margin: 0; padding: 20px 24px; background: #ffffff; }</style>
</head>
<body>
<div style="display: flex; flex-direction: column; gap: 14px;">
  <div style="display: flex; align-items: baseline; gap: 16px;">
    <h1 style="margin: 0; font-size: 32px; font-weight: 800; line-height: 1.1;">Everything you need to land your next job</h1>
    <span style="font-family: var(--cv-font-mono); font-size: 10px; color: var(--cv-text-subtle); white-space: nowrap;">page title · 24–32 / 700–800</span>
  </div>
  <div style="display: flex; align-items: baseline; gap: 16px;">
    <h2 style="margin: 0; font-size: 20px; font-weight: 700;">Today's job-search plan</h2>
    <span style="font-family: var(--cv-font-mono); font-size: 10px; color: var(--cv-text-subtle); white-space: nowrap;">section title · 16–22 / 650–750</span>
  </div>
  <div style="display: flex; align-items: baseline; gap: 16px;">
    <h3 style="margin: 0; font-size: 14px; font-weight: 700; font-family: var(--cv-font-body);">Senior Frontend Engineer</h3>
    <span style="font-family: var(--cv-font-mono); font-size: 10px; color: var(--cv-text-subtle); white-space: nowrap;">card title · 13–15 / 700 · Inter</span>
  </div>
  <p style="margin: 0; font-size: 11px; font-weight: 600; color: var(--cv-text-muted); font-family: var(--cv-font-body);">Plus Jakarta Sans 400–800 · headings only · never hero-scale inside cards or panels</p>
</div>
</body>
</html>
